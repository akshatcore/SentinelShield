<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelShield SOC Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-shield-alt"></i> SENTINEL</h2>
            </div>
            <ul>
                <li class="active"><a href="#"><i class="fas fa-chart-line"></i> Live Monitor</a></li>
                <li><a href="#"><i class="fas fa-list"></i> Logs</a></li>
                <li><a href="#"><i class="fas fa-ban"></i> Blacklist</a></li>
                <li><a href="#"><i class="fas fa-cogs"></i> Settings</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <h1>Security Operations Center</h1>
                <div class="status-indicator">
                    <span class="dot"></span> System Operational
                </div>
            </header>

            <div class="stats-grid">
                <div class="card stat-card red">
                    <h3>Blocked Threats</h3>
                    <p id="blocked-count">0</p>
                    <i class="fas fa-user-shield bg-icon"></i>
                </div>
                <div class="card stat-card blue">
                    <h3>Total Requests</h3>
                    <p id="total-count">0</p>
                    <i class="fas fa-globe bg-icon"></i>
                </div>
                <div class="card stat-card orange">
                    <h3>Active Bans</h3>
                    <p id="ban-count">0</p>
                    <i class="fas fa-ban bg-icon"></i>
                </div>
            </div>

            <div class="charts-grid">
                <div class="card">
                    <h3>Attack Distribution</h3>
                    <canvas id="attackChart"></canvas>
                </div>
                <div class="card">
                    <h3>Top Attacking IPs</h3>
                    <canvas id="ipChart"></canvas>
                </div>
            </div>

            <div class="card full-width">
                <h3>Live Threat Feed</h3>
                <div class="table-responsive">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>IP Address</th>
                                <th>Attack Type</th>
                                <th>Risk Score</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
