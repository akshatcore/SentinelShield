<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelShield | SOC Authentication</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }
        .logo-large {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-subtle);
            padding: 12px 15px;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #2563eb;
        }
        #error-msg {
            color: var(--danger);
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel login-container">
        <div class="logo-large">
            <i class="fas fa-shield-virus" style="color: var(--primary);"></i>
            SENTINEL<span style="color: var(--primary);">SHIELD</span>
        </div>
        <div class="subtitle">Secure SOC Gateway v2.4</div>

        <form id="login-form">
            <div class="input-group">
                <label for="username">Operator ID</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">Passphrase</label>
                <input type="password" id="password" class="input-field" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-login" id="submit-btn">
                <i class="fas fa-sign-in-alt"></i> Initialize Uplink
            </button>

            <div id="error-msg"><i class="fas fa-exclamation-triangle"></i> Access Denied: Invalid Credentials</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.status === 200) {
                    btn.innerHTML = '<i class="fas fa-check"></i> Access Granted';
                    btn.style.background = 'var(--success)';
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Initialize Uplink';
                    btn.disabled = false;
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Initialize Uplink';
                btn.disabled = false;
                errorMsg.innerText = "Connection error. Check backend.";
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
