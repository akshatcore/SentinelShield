<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelShield | SOC Authentication</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Removed the hardcoded background so it inherits the image from style.css */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            box-sizing: border-box;
            text-align: center;
            /* Added a subtle internal glow for the login box */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
        }
        .logo-large {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 14px 15px;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow-primary);
            background: rgba(0, 0, 0, 0.6);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: var(--glow-primary);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
        }
        #error-msg {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.9rem;
            display: none;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="glass-panel login-container fade-in">
        <div class="logo-large">
            <i class="fas fa-shield-virus" style="color: var(--primary);"></i>
            SENTINEL<span style="color: var(--primary);">SHIELD</span>
        </div>
        <div class="subtitle">SECURE SOC GATEWAY v4.0</div>

        <form id="login-form">
            <div class="input-group">
                <label for="username">Operator ID</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">Passphrase</label>
                <input type="password" id="password" class="input-field" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-login" id="submit-btn">
                <i class="fas fa-sign-in-alt"></i> Initialize Uplink
            </button>

            <div id="error-msg"><i class="fas fa-exclamation-triangle"></i> Access Denied: Invalid Credentials</div>
        </form>
    </div>

    <script>
        // Anti-Snooping UI Restrictions
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.status === 200) {
                    btn.innerHTML = '<i class="fas fa-check"></i> Access Granted';
                    btn.style.background = 'var(--success)';
                    btn.style.borderColor = 'var(--success)';
                    btn.style.boxShadow = '0 0 20px rgba(16, 185, 129, 0.4)';
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Initialize Uplink';
                    btn.disabled = false;
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Initialize Uplink';
                btn.disabled = false;
                errorMsg.innerHTML = '<i class="fas fa-wifi"></i> Connection error. Check backend.';
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
